name: Version Checks
description: >-
  Check GitHub Action pins, npm dependencies and NODE/PNPM/runner version
  consistency, and report findings as self-updating PR comments.
author: Lennard Solterbeck
branding:
  icon: align-justify
  color: green

inputs:
  github-token:
    description: "Token used for GitHub API calls and posting PR comments."
    required: false
    default: ${{ github.token }}
  check-actions:
    description: "Check GitHub Action pins (SHA pinning, SHA/comment match, conflicts, outdated)."
    required: false
    default: "true"
  check-npm:
    description: "Check npm dependency versions and install age. Requires a pnpm project."
    required: false
    default: "true"
  check-runtime:
    description: "Check NODE / PNPM / runner version consistency. Requires package.json."
    required: false
    default: "true"
  setup-pnpm:
    description: "Set up pnpm and Node for the npm check. Set false if the caller already did."
    required: false
    default: "true"
  node-version-file:
    description: "File that setup-node reads the Node version from (npm check only)."
    required: false
    default: package.json
  pnpm-version:
    description: "Explicit pnpm version for pnpm/action-setup. Empty = read packageManager from package.json."
    required: false
    default: ""

runs:
  using: composite
  steps:
    # --- GitHub Action pin checks ---------------------------------------
    - name: Scan and verify action versions
      if: ${{ inputs.check-actions == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: python3 "$GITHUB_ACTION_PATH/scripts/scan_actions.py"

    - name: Verify SHA matches version comment
      if: ${{ inputs.check-actions == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: python3 "$GITHUB_ACTION_PATH/scripts/verify_sha.py"

    - name: Post PR comments for action checks
      if: ${{ always() && inputs.check-actions == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: python3 "$GITHUB_ACTION_PATH/scripts/post_action_comments.py"

    - name: Fail if action checks failed
      if: ${{ always() && inputs.check-actions == 'true' }}
      shell: bash
      run: python3 "$GITHUB_ACTION_PATH/scripts/fail_on_errors.py"

    # --- npm dependency checks ------------------------------------------
    - name: Setup pnpm
      if: ${{ inputs.check-npm == 'true' && inputs.setup-pnpm == 'true' }}
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      with:
        version: ${{ inputs.pnpm-version }}

    - name: Setup Node.js
      if: ${{ inputs.check-npm == 'true' && inputs.setup-pnpm == 'true' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: ${{ inputs.node-version-file }}

    - name: Scan and verify npm dependency versions
      if: ${{ inputs.check-npm == 'true' }}
      shell: bash
      run: python3 "$GITHUB_ACTION_PATH/scripts/scan_npm.py"

    - name: Post PR comment for npm checks
      if: ${{ always() && inputs.check-npm == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: python3 "$GITHUB_ACTION_PATH/scripts/post_npm_comment.py"

    - name: Fail if npm age check failed
      if: ${{ always() && inputs.check-npm == 'true' }}
      shell: bash
      run: python3 "$GITHUB_ACTION_PATH/scripts/fail_on_npm_errors.py"

    # --- runtime version checks -----------------------------------------
    - name: Scan runtime versions
      if: ${{ inputs.check-runtime == 'true' }}
      shell: bash
      run: python3 "$GITHUB_ACTION_PATH/scripts/scan_runtime_versions.py"

    - name: Post PR comments for runtime checks
      if: ${{ always() && inputs.check-runtime == 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        REPO: ${{ github.repository }}
      run: python3 "$GITHUB_ACTION_PATH/scripts/post_runtime_comment.py"

    - name: Fail if runtime version conflicts found
      if: ${{ always() && inputs.check-runtime == 'true' }}
      shell: bash
      run: python3 "$GITHUB_ACTION_PATH/scripts/fail_on_runtime_errors.py"
