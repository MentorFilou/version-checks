name: Version Checks

# Reusable workflow. Call it from another repository like this:
#
#   jobs:
#     version-checks:
#       uses: OWNER/version-checks/.github/workflows/version-checks.yml@v1
#       permissions:
#         contents: read
#         pull-requests: write
#
# It checks out the calling repository, then checks out THIS repository's
# Python scripts at the exact commit this workflow was loaded from
# (job.workflow_sha), so the scripts always match the pinned workflow version
# with no hardcoded owner/repo/ref.

on:
  workflow_call:
    inputs:
      check-actions:
        description: "Check GitHub Action pins (SHA pinning, SHA/comment match, conflicts, outdated)."
        type: boolean
        default: true
      check-npm:
        description: "Check npm dependency versions and install age. Requires a pnpm project."
        type: boolean
        default: true
      check-runtime:
        description: "Check NODE / PNPM / runner version consistency. Requires package.json."
        type: boolean
        default: true
      runner:
        description: "The runner to execute on."
        type: string
        default: ubuntu-24.04
      node-version-file:
        description: "File that setup-node reads the Node version from (npm check only)."
        type: string
        default: package.json
      pnpm-version:
        description: "Explicit pnpm version for pnpm/action-setup. Empty = read packageManager from package.json."
        type: string
        default: ""

jobs:
  check-action-versions:
    name: Check GitHub Action versions
    if: ${{ inputs.check-actions }}
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout calling repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Resolve version-checks repository
        id: tool
        run: echo "repo=$(echo '${{ job.workflow_ref }}' | cut -d/ -f1-2)" >> "$GITHUB_OUTPUT"

      - name: Checkout version-checks scripts
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ steps.tool.outputs.repo }}
          ref: ${{ job.workflow_sha }}
          path: .version-checks

      - name: Scan and verify action versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 .version-checks/scripts/scan_actions.py

      - name: Verify SHA matches version comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 .version-checks/scripts/verify_sha.py

      - name: Post PR comments for action checks
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python3 .version-checks/scripts/post_action_comments.py

      - name: Fail if action checks failed
        if: always()
        run: python3 .version-checks/scripts/fail_on_errors.py

  check-npm-versions:
    name: Check npm dependency versions
    if: ${{ inputs.check-npm }}
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout calling repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Resolve version-checks repository
        id: tool
        run: echo "repo=$(echo '${{ job.workflow_ref }}' | cut -d/ -f1-2)" >> "$GITHUB_OUTPUT"

      - name: Checkout version-checks scripts
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ steps.tool.outputs.repo }}
          ref: ${{ job.workflow_sha }}
          path: .version-checks

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ${{ inputs.node-version-file }}

      - name: Scan and verify npm dependency versions
        run: python3 .version-checks/scripts/scan_npm.py

      - name: Post PR comment for npm checks
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python3 .version-checks/scripts/post_npm_comment.py

      - name: Fail if npm age check failed
        if: always()
        run: python3 .version-checks/scripts/fail_on_npm_errors.py

  check-runtime-versions:
    name: Check NODE / PNPM / runner version consistency
    if: ${{ inputs.check-runtime }}
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout calling repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Resolve version-checks repository
        id: tool
        run: echo "repo=$(echo '${{ job.workflow_ref }}' | cut -d/ -f1-2)" >> "$GITHUB_OUTPUT"

      - name: Checkout version-checks scripts
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ steps.tool.outputs.repo }}
          ref: ${{ job.workflow_sha }}
          path: .version-checks

      - name: Scan runtime versions
        run: python3 .version-checks/scripts/scan_runtime_versions.py

      - name: Post PR comments for runtime checks
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python3 .version-checks/scripts/post_runtime_comment.py

      - name: Fail if runtime version conflicts found
        if: always()
        run: python3 .version-checks/scripts/fail_on_runtime_errors.py
