name: Version Checks

on:
  pull_request:
    branches:
      - main

jobs:
  check-action-versions:
    name: Check GitHub Action versions
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Scan and verify action versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 .github/scripts/version-checks/scan_actions.py

      - name: Verify SHA matches version comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 .github/scripts/version-checks/verify_sha.py

      - name: Post PR comments for action checks
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/version-checks/post_action_comments.py

      - name: Fail if action checks failed
        if: always()
        run: python3 .github/scripts/version-checks/fail_on_errors.py

  check-npm-versions:
    name: Check npm dependency versions
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json

      - name: Scan and verify npm dependency versions
        run: python3 .github/scripts/version-checks/scan_npm.py

      - name: Post PR comment for npm checks
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/version-checks/post_npm_comment.py

      - name: Fail if npm age check failed
        if: always()
        run: python3 .github/scripts/version-checks/fail_on_npm_errors.py

  check-runtime-versions:
    name: Check NODE / PNPM / runner version consistency
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Scan runtime versions
        run: python3 .github/scripts/version-checks/scan_runtime_versions.py

      - name: Post PR comments for runtime checks
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: python3 .github/scripts/version-checks/post_runtime_comment.py

      - name: Fail if runtime version conflicts found
        if: always()
        run: python3 .github/scripts/version-checks/fail_on_runtime_errors.py
